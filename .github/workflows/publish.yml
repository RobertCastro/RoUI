name: Publish to npm

# Publica en el registry público de npm al subir un tag de versión (vX.Y.Z).
# Requiere el secret NPM_TOKEN (token "Automation" de npmjs.com) en el repo.
# Flujo: npm version patch/minor/major → git push --follow-tags → publica.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Verifica que el tag (vX.Y.Z) coincida con la versión de package.json.
      - name: Verificar tag vs versión
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG  tag=$TAG"
          test "$PKG" = "$TAG" || { echo "::error::El tag ($TAG) no coincide con package.json ($PKG)"; exit 1; }

      # `npm publish` dispara el script `prepare` → compila dist/ antes de publicar.
      - name: Publicar
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
