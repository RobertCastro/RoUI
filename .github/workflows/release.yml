name: Release

# Al integrar en main: si hay changesets pendientes, abre/actualiza la PR
# "Version Packages" (sube la version y consolida el CHANGELOG). Cuando no quedan
# changesets (tras mergear esa PR), publica a npm con provenance.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write # provenance (OIDC) al publicar

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - name: Install locked dependencies
        run: npm ci
      - name: Version PR o publicacion
        uses: changesets/action@v1
        with:
          version: npm run changeset:version
          publish: npm run release
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
