name: Deploy docs (GitHub Pages)

# Publica la galería (docs/) como sitio público. Requiere:
# Settings → Pages → Source: "GitHub Actions".
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Compilar bundle
        run: npm run build
      - name: Ensamblar sitio (docs + dist + redirect)
        run: |
          mkdir -p _site
          cp -r docs _site/docs
          cp -r dist _site/dist
          printf '<!doctype html><meta charset="utf-8"><meta http-equiv="refresh" content="0; url=./docs/">' > _site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
